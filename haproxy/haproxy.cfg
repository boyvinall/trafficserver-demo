global
    log stdout format raw local0
    maxconn 4096

    # Stats socket disabled due to permission issues in Alpine
    # stats socket /var/run/haproxy.sock mode 660 level admin
    # stats timeout 30s

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

    # Enable HTTP keep-alive
    option http-keep-alive
    timeout http-keep-alive 10s

# HAProxy statistics page
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:admin
    stats admin if TRUE

# Frontend - accepts client connections
frontend http_front
    bind *:80

    # Add custom headers to track request flow
    http-request set-header X-Request-ID %[uuid()]

    # Use the ATS cluster backend
    default_backend ats_cluster

# Backend - ATS cluster with consistent hashing
backend ats_cluster
    # Consistent hash based on request URI
    # This ensures the same URL always goes to the same ATS node
    balance uri
    hash-type consistent

    # Health check - verify ATS stats endpoint is responding
    option httpchk GET /_stats
    http-check send hdr Host ats
    http-check expect status 200

    # Timeouts specific to origin requests
    timeout server 30s
    timeout connect 5s

    # Add header to show which backend was selected
    http-response set-header X-Backend-Server %s

    # The 3 ATS cache nodes
    # Each node gets equal weight in the consistent hash ring
    server ats-1 ats-1:8080 check inter 5s rise 2 fall 3
    server ats-2 ats-2:8080 check inter 5s rise 2 fall 3
    server ats-3 ats-3:8080 check inter 5s rise 2 fall 3
