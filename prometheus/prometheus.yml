global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ats-docker-cluster'
    environment: 'demo'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Load alert rules
rule_files:
  - '/etc/prometheus/alerts.yml'

# Scrape configurations
scrape_configs:
  # ATS Node 1
  - job_name: 'ats-1'
    static_configs:
      - targets: ['ats-1:8080']
        labels:
          instance: 'ats-1'
          service: 'trafficserver'
    metrics_path: '/_stats'
    params:
      format: ['json']  # ATS stats format

  # ATS Node 2
  - job_name: 'ats-2'
    static_configs:
      - targets: ['ats-2:8080']
        labels:
          instance: 'ats-2'
          service: 'trafficserver'
    metrics_path: '/_stats'
    params:
      format: ['json']

  # ATS Node 3
  - job_name: 'ats-3'
    static_configs:
      - targets: ['ats-3:8080']
        labels:
          instance: 'ats-3'
          service: 'trafficserver'
    metrics_path: '/_stats'
    params:
      format: ['json']

  # HAProxy Stats
  - job_name: 'haproxy'
    static_configs:
      - targets: ['haproxy:8404']
        labels:
          instance: 'haproxy'
          service: 'loadbalancer'

  # Origin API (includes Prometheus metrics)
  - job_name: 'origin-api'
    static_configs:
      - targets: ['origin-api:9002']
        labels:
          instance: 'origin-api'
          service: 'backend'
    metrics_path: '/metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'
          service: 'monitoring'
